<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gubby</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

/* Fullscreen video */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay loop playsinline id="bgVideo">
  <source src="gubby.mp4" type="video/mp4">
</video>

<!-- AUDIO -->
<audio id="bgAudio" loop>
  <source src="gubby.mp3" type="audio/mpeg">
</audio>

<script>
// Try autoplay both (browser may block audio until interaction)
const audio = document.getElementById("bgAudio");

window.addEventListener("load", () => {
  audio.volume = 0.5;
  
  const playPromise = audio.play();
  if (playPromise !== undefined) {
    playPromise.catch(() => {
      // If blocked, start on first click
      document.body.addEventListener("click", () => {
        audio.play();
      }, { once: true });
    });
  }
});
</script>

</body>
</html>
