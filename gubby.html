<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gubby</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

/* Makes video fill entire screen */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover; /* stretches while keeping aspect fill */
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
  <source src="gubby.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>

</body>
</html>
