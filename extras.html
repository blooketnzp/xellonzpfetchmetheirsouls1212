<script>

const items=[...document.querySelectorAll('#menuList li')];
let i=0;

function update(){
 items.forEach(e=>e.classList.remove('active'));
 items[i].classList.add('active');
}

document.addEventListener('keydown',e=>{
 if(e.key==='ArrowDown'){i=(i+1)%items.length;update()}
 if(e.key==='ArrowUp'){i=(i-1+items.length)%items.length;update()}
 if(e.key==='Enter'){items[i].click();}
 if(e.key==='Escape'){closeIframe();}
});

function openIframe(url){
 const frame=document.getElementById("gameFrame");
 const container=document.getElementById("iframeContainer");

 frame.src=url;
 container.style.display="block";
}

function closeIframe(){
 const frame=document.getElementById("gameFrame");
 const container=document.getElementById("iframeContainer");

 frame.src="";
 container.style.display="none";
}

/* Film grain */

const c=document.getElementById('grain');
const ctx=c.getContext('2d');

function r(){
 c.width=innerWidth;
 c.height=innerHeight;
}

r();
addEventListener('resize',r);

function n(){
 const id=ctx.createImageData(c.width,c.height);

 for(let i=0;i<id.data.length;i+=4){
  const v=Math.random()*255|0;
  id.data[i]=id.data[i+1]=id.data[i+2]=v;
  id.data[i+3]=35;
 }

 ctx.putImageData(id,0,0);
 requestAnimationFrame(n);
}

n();

</script>
